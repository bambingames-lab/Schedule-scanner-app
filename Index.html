<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:#f2f2f7;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:white;
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
}

button{
background:#007AFF;
color:white;
border:none;
padding:14px;
border-radius:10px;
width:100%;
font-size:16px;
margin-top:10px;
}

input,textarea,select{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

.event{
border:1px solid #eee;
border-radius:12px;
padding:12px;
margin-bottom:10px;
}

.status{
margin-top:10px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Schedule Scanner</h1>

<button onclick="openFile()">Upload & Scan Schedule</button>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<div class="status" id="status"></div>

</div>

<div class="card">

<h2>Raw OCR Text</h2>

<textarea id="rawTextBox" rows="6"></textarea>

<button onclick="reparse()">Re-Analyze Text</button>

</div>

<div class="card">

<h2>Detected Events</h2>

<div id="events"></div>

<button onclick="exportCalendar()">Export to Apple Calendar</button>

</div>

</div>

<script>

let events=[]

const dayMap={
Sun:"SU",
Mon:"MO",
Tue:"TU",
Wed:"WE",
Thu:"TH",
Fri:"FR",
Sat:"SA"
}

function openFile(){
document.getElementById("imageInput").click()
}

document.getElementById("imageInput").addEventListener("change",async function(){

const file=this.files[0]

if(!file)return

document.getElementById("status").innerText="Reading image..."

const result=await Tesseract.recognize(file,"eng")

const text=result.data.text

document.getElementById("rawTextBox").value=text

parse(text)

})

function reparse(){
parse(document.getElementById("rawTextBox").value)
}

function parse(text){

events=[]

const lines=text.split("\n")

const dayRegex=/sun|mon|tue|wed|thu|fri|sat/i
const timeRegex=/(\d{1,2})(:\d{2})?\s?(AM|PM|am|pm)?/

lines.forEach(line=>{

const day=line.match(dayRegex)
const time=line.match(timeRegex)

if(day && time){

events.push({
title:cleanTitle(line),
day:normalizeDay(day[0]),
time:normalizeTime(time[0])
})

}

})

display()

}

function cleanTitle(line){

return line
.replace(/\b(mon|tue|wed|thu|fri|sat|sun)\b/ig,"")
.replace(/\d{1,2}(:\d{2})?\s?(AM|PM)?/ig,"")
.replace(/\s+/g," ")
.trim()

}

function normalizeDay(d){

d=d.toLowerCase()

if(d.startsWith("sun"))return"Sun"
if(d.startsWith("mon"))return"Mon"
if(d.startsWith("tue"))return"Tue"
if(d.startsWith("wed"))return"Wed"
if(d.startsWith("thu"))return"Thu"
if(d.startsWith("fri"))return"Fri"
if(d.startsWith("sat"))return"Sat"

}

function normalizeTime(t){

t=t.toUpperCase()

let parts=t.replace("AM","").replace("PM","").split(":")

let h=parseInt(parts[0])
let m=parseInt(parts[1]||0)

if(t.includes("PM")&&h<12)h+=12
if(t.includes("AM")&&h==12)h=0

return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")

}

function display(){

const container=document.getElementById("events")

container.innerHTML=""

events.forEach((e,i)=>{

let div=document.createElement("div")

div.className="event"

div.innerHTML=`

<input value="${e.title}" onchange="events[${i}].title=this.value">

<select onchange="events[${i}].day=this.value">

<option ${e.day=="Sun"?"selected":""}>Sun</option>
<option ${e.day=="Mon"?"selected":""}>Mon</option>
<option ${e.day=="Tue"?"selected":""}>Tue</option>
<option ${e.day=="Wed"?"selected":""}>Wed</option>
<option ${e.day=="Thu"?"selected":""}>Thu</option>
<option ${e.day=="Fri"?"selected":""}>Fri</option>
<option ${e.day=="Sat"?"selected":""}>Sat</option>

</select>

<input type="time" value="${e.time}" onchange="events[${i}].time=this.value">

`

container.appendChild(div)

})

}

function exportCalendar(){

let ics="BEGIN:VCALENDAR\nVERSION:2.0\n"

events.forEach(e=>{

let start=new Date()

let [h,m]=e.time.split(":")

start.setHours(h)
start.setMinutes(m)

let end=new Date(start.getTime()+3600000)

ics+="BEGIN:VEVENT\n"
ics+="SUMMARY:"+e.title+"\n"
ics+="DTSTART:"+format(start)+"\n"
ics+="DTEND:"+format(end)+"\n"
ics+="RRULE:FREQ=WEEKLY;BYDAY="+dayMap[e.day]+"\n"
ics+="END:VEVENT\n"

})

ics+="END:VCALENDAR"

const blob=new Blob([ics],{type:"text/calendar"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="schedule.ics"

document.body.appendChild(a)
a.click()

}

function format(d){

return d.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z"

}

</script>

</body>
</html>
