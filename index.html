<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:#f2f2f7;
  margin:0;
  padding:20px;
  color:#111;
}

.container{
  max-width:720px;
  margin:auto;
}

.card{
  background:white;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

h1,h2,p{
  margin-top:0;
}

button{
  background:#007AFF;
  color:white;
  border:none;
  padding:14px;
  border-radius:10px;
  width:100%;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}

button.secondary{
  background:#8E8E93;
}

input,textarea,select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:15px;
  box-sizing:border-box;
}

.event{
  border:1px solid #eee;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  background:#fafafa;
}

.status{
  margin-top:10px;
  color:#666;
  min-height:20px;
}

.note{
  color:#666;
  font-size:14px;
}

.warning{
  color:#b45309;
  font-size:13px;
  margin-top:4px;
}

.canvas-preview{
  width:100%;
  border-radius:12px;
  margin-top:12px;
  display:none;
  border:1px solid #ddd;
}
</style>
</head>

<body>
<div class="container">

  <div class="card">
    <h1>Schedule Scanner</h1>
    <p class="note">Upload a screenshot, review the text and events, then export verified events to Apple Calendar.</p>

    <button onclick="openFile()">Upload &amp; Scan Schedule</button>
    <input type="file" id="imageInput" accept="image/*" style="display:none">

    <div id="status" class="status"></div>
    <canvas id="processedCanvas" class="canvas-preview"></canvas>
  </div>

  <div class="card">
    <h2>Raw OCR Text</h2>
    <p class="note">This is exactly what the scanner read. You can edit it and re-analyze.</p>
    <textarea id="rawTextBox" rows="8" placeholder="Scanned text will appear here..."></textarea>
    <button class="secondary" onclick="reparse()">Re-Analyze Text</button>
  </div>

  <div class="card">
    <h2>Detected Events</h2>
    <div id="events"></div>
    <button onclick="exportCalendar()">Export to Apple Calendar</button>
  </div>

</div>

<script>
let events = []

const dayMap = {
  Sun: "SU",
  Mon: "MO",
  Tue: "TU",
  Wed: "WE",
  Thu: "TH",
  Fri: "FR",
  Sat: "SA"
}

const monthMap = {
  jan: 1,
  january: 1,
  feb: 2,
  february: 2,
  mar: 3,
  march: 3,
  apr: 4,
  april: 4,
  may: 5,
  jun: 6,
  june: 6,
  jul: 7,
  july: 7,
  aug: 8,
  august: 8,
  sep: 9,
  sept: 9,
  september: 9,
  oct: 10,
  october: 10,
  nov: 11,
  november: 11,
  dec: 12,
  december: 12
}

function openFile(){
  document.getElementById("imageInput").click()
}

document.getElementById("imageInput").addEventListener("change", async function(){
  const file = this.files[0]
  if(!file) return

  try{
    setStatus("Preparing image...")
    const processedCanvas = await preprocessImage(file)

    const preview = document.getElementById("processedCanvas")
    preview.width = processedCanvas.width
    preview.height = processedCanvas.height
    preview.getContext("2d").drawImage(processedCanvas, 0, 0)
    preview.style.display = "block"

    setStatus("Reading image...")
    const result = await Tesseract.recognize(processedCanvas, "eng", {
      logger: m => {
        if(m.status === "recognizing text"){
          setStatus("Reading image... " + Math.round((m.progress || 0) * 100) + "%")
        }
      }
    })

    const text = postProcessOCR(result?.data?.text || "")
    document.getElementById("rawTextBox").value = text
    parse(text)
    this.value = ""
  }catch(err){
    console.error(err)
    setStatus("Could not analyze that image.")
    alert("There was a problem reading the image.")
  }
})

async function preprocessImage(file){
  const img = await loadImage(file)
  const scale = 2

  const canvas = document.createElement("canvas")
  const ctx = canvas.getContext("2d")

  canvas.width = img.width * scale
  canvas.height = img.height * scale

  ctx.drawImage(img, 0, 0, canvas.width, canvas.height)

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height)
  const data = imageData.data

  for(let i = 0; i < data.length; i += 4){
    const r = data[i]
    const g = data[i + 1]
    const b = data[i + 2]

    let gray = 0.299 * r + 0.587 * g + 0.114 * b
    gray = gray > 160 ? 255 : 0

    data[i] = gray
    data[i + 1] = gray
    data[i + 2] = gray
  }

  ctx.putImageData(imageData, 0, 0)
  return canvas
}

function loadImage(file){
  return new Promise((resolve, reject) => {
    const img = new Image()
    const reader = new FileReader()

    reader.onload = e => {
      img.onload = () => resolve(img)
      img.onerror = reject
      img.src = e.target.result
    }

    reader.onerror = reject
    reader.readAsDataURL(file)
  })
}

function postProcessOCR(text){
  return text
    .replace(/B(?=\d)/g, "8")
    .replace(/(?<=\d)B/g, "8")
    .replace(/(?<=\d)\sB(?=\s|:|$)/g, " 8")
    .replace(/S(?=\d)/g, "5")
    .replace(/(?<=\d)O(?=\d)/g, "0")
    .replace(/(?<=\d)l(?=\d)/g, "1")
    .replace(/(?<=\d)I(?=\d)/g, "1")
}

function reparse(){
  parse(document.getElementById("rawTextBox").value || "")
}

function parse(text){
  events = []

  const lines = text
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean)

  const mergedLines = []
  for(let i = 0; i < lines.length; i++){
    mergedLines.push(lines[i])
    if(i < lines.length - 1){
      mergedLines.push((lines[i] + " " + lines[i + 1]).trim())
    }
  }

  const candidates = [...new Set(mergedLines)]

  const dayRegex = /\b(sun|sunday|mon|monday|tue|tues|tuesday|wed|wednesday|thu|thur|thurs|thursday|fri|friday|sat|saturday)\b/i
  const timeRangeRegex = /(\d{1,2})(:\d{2})?\s?(AM|PM|am|pm)?\s*(?:-|–|to)\s*(\d{1,2})(:\d{2})?\s?(AM|PM|am|pm)?/
  const timeRegex = /(\d{1,2})(:\d{2})?\s?(AM|PM|am|pm)?/
  const monthDateRegex = /\b(jan|january|feb|february|mar|march|apr|april|may|jun|june|jul|july|aug|august|sep|sept|september|oct|october|nov|november|dec|december)\.?\s*(\d{1,2})(?:,\s*(\d{2,4}))?\b/i
  const slashDateRegex = /\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/

  const seen = new Set()

  candidates.forEach(line => {
    const day = line.match(dayRegex)
    const range = line.match(timeRangeRegex)
    const time = line.match(timeRegex)
    const monthDate = line.match(monthDateRegex)
    const slashDate = line.match(slashDateRegex)

    if(!range && !time) return
    if(!day && !monthDate && !slashDate) return

    let eventDay = day ? normalizeDay(day[0]) : ""
    let firstDate = ""

    if(monthDate){
      firstDate = normalizeMonthDate(monthDate[1], monthDate[2], monthDate[3])
    } else if(slashDate){
      firstDate = normalizeSlashDate(slashDate[1], slashDate[2], slashDate[3])
    }

    if(!eventDay && firstDate){
      eventDay = inferDayFromDate(firstDate)
    }

    let startTime = ""
    let endTime = ""

    if(range){
      startTime = normalizeTime((range[1] || "") + (range[2] || "") + (range[3] ? " " + range[3] : ""))
      endTime = normalizeTime((range[4] || "") + (range[5] || "") + (range[6] ? " " + range[6] : ""))
    }else if(time){
      startTime = normalizeTime(time[0])
      endTime = addOneHour(startTime)
    }

    const event = {
      title: cleanTitle(line),
      day: eventDay,
      firstDate: firstDate,
      time: startTime,
      endTime: endTime,
      suspicious: isSuspiciousTime(startTime) || isSuspiciousTime(endTime)
    }

    if(!event.title || !event.day || !event.time || !event.endTime) return

    const key = `${event.title}|${event.day}|${event.firstDate}|${event.time}|${event.endTime}`
    if(seen.has(key)) return
    seen.add(key)

    events.push(event)
  })

  display()
}

function cleanTitle(line){
  let cleaned = line
    .replace(/\b(sun|sunday|mon|monday|tue|tues|tuesday|wed|wednesday|thu|thur|thurs|thursday|fri|friday|sat|saturday)\b/ig,"")
    .replace(/\b(jan|january|feb|february|mar|march|apr|april|may|jun|june|jul|july|aug|august|sep|sept|september|oct|october|nov|november|dec|december)\.?\s*\d{1,2}(?:,\s*\d{2,4})?\b/ig,"")
    .replace(/\b\d{1,2}\/\d{1,2}(?:\/\d{2,4})?\b/ig,"")
    .replace(/\d{1,2}(:\d{2})?\s?(AM|PM)?\s*(?:-|–|to)\s*\d{1,2}(:\d{2})?\s?(AM|PM)?/ig,"")
    .replace(/\d{1,2}(:\d{2})?\s?(AM|PM)?/ig,"")
    .replace(/\s+/g," ")
    .trim()

  const chunks = cleaned
    .split(/[-–:|]/)
    .map(s => s.trim())
    .filter(Boolean)
    .filter(s => /[A-Za-z]{2,}/.test(s))

  if(chunks.length){
    return chunks.sort((a,b) => b.length - a.length)[0]
  }

  return cleaned
}

function normalizeDay(d){
  d = d.toLowerCase()

  if(d.startsWith("sun")) return "Sun"
  if(d.startsWith("mon")) return "Mon"
  if(d.startsWith("tue")) return "Tue"
  if(d.startsWith("wed")) return "Wed"
  if(d.startsWith("thu")) return "Thu"
  if(d.startsWith("fri")) return "Fri"
  if(d.startsWith("sat")) return "Sat"

  return ""
}

function normalizeMonthDate(monthText, dayText, yearText){
  const monthKey = monthText.toLowerCase().replace(".", "")
  const month = monthMap[monthKey]
  const day = parseInt(dayText, 10)
  let year = yearText ? parseInt(yearText, 10) : new Date().getFullYear()

  if(!month || !day) return ""
  if(year < 100) year += 2000

  return `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`
}

function normalizeSlashDate(monthText, dayText, yearText){
  const month = parseInt(monthText, 10)
  const day = parseInt(dayText, 10)
  let year = yearText ? parseInt(yearText, 10) : new Date().getFullYear()

  if(!month || !day) return ""
  if(year < 100) year += 2000

  return `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`
}

function inferDayFromDate(firstDate){
  if(!firstDate) return ""
  const d = new Date(firstDate + "T00:00:00")
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
  return days[d.getDay()] || ""
}

function normalizeTime(t){
  t = t.toUpperCase().trim()

  let parts = t.replace("AM","").replace("PM","").split(":")
  let h = parseInt(parts[0])
  let m = parseInt(parts[1] || 0)

  if(isNaN(h)) return ""

  if(t.includes("PM") && h < 12) h += 12
  if(t.includes("AM") && h === 12) h = 0

  if(!t.includes("AM") && !t.includes("PM")){
    if(h >= 1 && h <= 7) h += 12
  }

  return String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0")
}

function addOneHour(time24){
  if(!/^\d{2}:\d{2}$/.test(time24)) return ""
  const [h, m] = time24.split(":").map(Number)
  const d = new Date()
  d.setHours(h)
  d.setMinutes(m)
  d.setTime(d.getTime() + 60 * 60 * 1000)
  return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0")
}

function isSuspiciousTime(time){
  if(!time) return true
  const [h, m] = time.split(":").map(Number)
  if(isNaN(h) || isNaN(m)) return true
  if(h < 0 || h > 23) return true
  if(m < 0 || m > 59) return true
  return false
}

function display(){
  const container = document.getElementById("events")
  container.innerHTML = ""

  if(!events.length){
    container.innerHTML = '<p class="note">No events detected yet.</p>'
    setStatus("No events detected.")
    return
  }

  events.forEach((e, i) => {
    let div = document.createElement("div")
    div.className = "event"

    div.innerHTML = `
      <label>Title</label>
      <input value="${escapeHtml(e.title)}" onchange="events[${i}].title=this.value">

      <label>Day</label>
      <select onchange="events[${i}].day=this.value">
        <option value="Sun" ${e.day=="Sun"?"selected":""}>Sun</option>
        <option value="Mon" ${e.day=="Mon"?"selected":""}>Mon</option>
        <option value="Tue" ${e.day=="Tue"?"selected":""}>Tue</option>
        <option value="Wed" ${e.day=="Wed"?"selected":""}>Wed</option>
        <option value="Thu" ${e.day=="Thu"?"selected":""}>Thu</option>
        <option value="Fri" ${e.day=="Fri"?"selected":""}>Fri</option>
        <option value="Sat" ${e.day=="Sat"?"selected":""}>Sat</option>
      </select>

      <label>First Date</label>
      <input type="date" value="${escapeHtml(e.firstDate || "")}" onchange="events[${i}].firstDate=this.value">

      <label>Start Time</label>
      <input type="time" value="${e.time}" onchange="events[${i}].time=this.value">

      <label>End Time</label>
      <input type="time" value="${e.endTime}" onchange="events[${i}].endTime=this.value">

      ${e.suspicious ? '<div class="warning">Check this time before exporting</div>' : ""}
    `

    container.appendChild(div)
  })

  setStatus(`Detected ${events.length} event(s). Review before exporting.`)
}

function exportCalendar(){
  if(!events.length){
    alert("There are no events to export.")
    return
  }

  for(let i = 0; i < events.length; i++){
    if(!events[i].title || !events[i].day || !events[i].time || !events[i].endTime){
      alert(`Event ${i + 1} is missing information.`)
      return
    }
  }

  let ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\n"

  events.forEach(e => {
    let start = buildEventDate(e.firstDate, e.day, e.time)
    let end = buildEventDate(e.firstDate, e.day, e.endTime)

    ics += "BEGIN:VEVENT\r\n"
    ics += "SUMMARY:" + escapeICS(e.title) + "\r\n"
    ics += "DTSTART:" + formatLocal(start) + "\r\n"
    ics += "DTEND:" + formatLocal(end) + "\r\n"
    ics += "RRULE:FREQ=WEEKLY;BYDAY=" + dayMap[e.day] + "\r\n"
    ics += "END:VEVENT\r\n"
  })

  ics += "END:VCALENDAR"

  const blob = new Blob([ics], { type: "text/calendar" })
  const url = URL.createObjectURL(blob)

  const a = document.createElement("a")
  a.href = url
  a.download = "schedule.ics"
  document.body.appendChild(a)
  a.click()
  a.remove()
}

function buildEventDate(firstDate, day, time){
  let baseDate

  if(firstDate){
    baseDate = new Date(firstDate + "T00:00:00")
  } else {
    baseDate = nextOccurrenceOfDay(day)
  }

  const [h, m] = time.split(":").map(Number)
  baseDate.setHours(h)
  baseDate.setMinutes(m)
  baseDate.setSeconds(0)
  baseDate.setMilliseconds(0)

  return baseDate
}

function nextOccurrenceOfDay(day){
  const dayIndexMap = { Sun:0, Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6 }
  const today = new Date()
  const target = dayIndexMap[day]
  const result = new Date(today)
  const diff = (target - today.getDay() + 7) % 7
  result.setDate(today.getDate() + diff)
  result.setHours(0,0,0,0)
  return result
}

function formatLocal(d){
  const year = d.getFullYear()
  const month = String(d.getMonth() + 1).padStart(2, "0")
  const day = String(d.getDate()).padStart(2, "0")
  const hours = String(d.getHours()).padStart(2, "0")
  const minutes = String(d.getMinutes()).padStart(2, "0")
  return `${year}${month}${day}T${hours}${minutes}00`
}

function setStatus(message){
  document.getElementById("status").innerText = message
}

function escapeHtml(str){
  return String(str || "")
    .replace(/&/g,"&amp;")
    .replace(/"/g,"&quot;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
}

function escapeICS(str){
  return String(str || "")
    .replace(/\\/g, "\\\\")
    .replace(/,/g, "\\,")
    .replace(/;/g, "\\;")
    .replace(/\n/g, "\\n")
}
</script>
</body>
</html>
